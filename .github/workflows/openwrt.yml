name: OpenWrt packages

on:
  workflow_dispatch:
    inputs:
      release_tag:
        description: Existing v* tag to build and publish (leave empty for a test build)
        required: false
        type: string
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: openwrt-${{ github.ref }}
  cancel-in-progress: false

env:
  OPENWRT_BASE_URL: https://downloads.openwrt.org/releases/25.12.5/targets/x86/64
  SDK_ARCHIVE: openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64.tar.zst
  SDK_DIR_NAME: openwrt-sdk-25.12.5-x86-64_gcc-14.3.0_musl.Linux-x86_64
  SDK_SHA256: 0c8df0151a1e88feb7c03d694d61f6a18d51872815b7c811d76e2b77504d5e9c

jobs:
  build:
    name: OpenWrt 25.12.5 x86-64
    runs-on: ubuntu-24.04
    timeout-minutes: 90

    steps:
      - name: Resolve source ref
        id: source
        shell: bash
        env:
          REQUESTED_RELEASE_TAG: ${{ inputs.release_tag }}
          EVENT_REF: ${{ github.ref }}
        run: |
          requested="${REQUESTED_RELEASE_TAG#release_tag=}"
          requested="${requested#refs/tags/}"

          if [ -n "$requested" ]; then
            if [[ ! "$requested" =~ ^v[0-9A-Za-z._-]+$ ]]; then
              echo "Invalid release tag '$REQUESTED_RELEASE_TAG'; expected a value such as v0.1.0-r21" >&2
              exit 1
            fi
            source_ref="refs/tags/$requested"
            release_tag="$requested"
          else
            source_ref="$EVENT_REF"
            case "$EVENT_REF" in
              refs/tags/v*) release_tag="${EVENT_REF#refs/tags/}" ;;
              *) release_tag= ;;
            esac
          fi

          echo "ref=$source_ref" >> "$GITHUB_OUTPUT"
          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "Using source ref: $source_ref"

      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
          ref: ${{ steps.source.outputs.ref }}

      - name: Install SDK host dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends bison build-essential clang file flex g++ gawk gcc-multilib gettext git libncurses-dev libssl-dev python3 python3-setuptools rsync swig unzip wget zlib1g-dev zstd

      - name: Restore cached OpenWrt SDK archive
        id: sdk-cache
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/${{ env.SDK_ARCHIVE }}
          key: openwrt-sdk-${{ env.SDK_SHA256 }}

      - name: Download and verify OpenWrt SDK
        shell: bash
        run: |
          if [ ! -f "$RUNNER_TEMP/$SDK_ARCHIVE" ]; then
            curl --fail --location --retry 3 "$OPENWRT_BASE_URL/$SDK_ARCHIVE" --output "$RUNNER_TEMP/$SDK_ARCHIVE"
          fi
          # The checksum gate also applies to cache restores, so a corrupted or
          # tampered cache entry fails the build instead of being trusted.
          echo "$SDK_SHA256  $RUNNER_TEMP/$SDK_ARCHIVE" | sha256sum --check -
          tar --zstd -xf "$RUNNER_TEMP/$SDK_ARCHIVE" -C "$RUNNER_TEMP"
          echo "SDK_DIR=$RUNNER_TEMP/$SDK_DIR_NAME" >> "$GITHUB_ENV"

      - name: Restore cached SDK feeds
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ${{ runner.temp }}/${{ env.SDK_DIR_NAME }}/feeds
          key: openwrt-feeds-${{ env.SDK_SHA256 }}

      - name: Restore release feeds and target config
        shell: bash
        run: |
          curl --fail --location --retry 3 "$OPENWRT_BASE_URL/config.buildinfo" --output "$SDK_DIR/.config"
          cd "$SDK_DIR"

          # The release SDK pins every feed to an exact commit. Keep those pins,
          # but use the official GitHub repositories to avoid relying on a
          # single git.openwrt.org endpoint.
          if [ ! -f feeds.conf ]; then
            cp feeds.conf.default feeds.conf
          fi
          sed -i \
            -e 's#https://git.openwrt.org/openwrt/openwrt.git#https://github.com/openwrt/openwrt.git#' \
            -e 's#https://git.openwrt.org/feed/packages.git#https://github.com/openwrt/packages.git#' \
            -e 's#https://git.openwrt.org/project/luci.git#https://github.com/openwrt/luci.git#' \
            feeds.conf

          update_feed() {
            feed="$1"
            attempt=1
            while [ "$attempt" -le 3 ]; do
              if ./scripts/feeds update "$feed"; then
                return 0
              fi
              if [ "$attempt" -eq 3 ]; then
                echo "Failed to update required feed '$feed' after $attempt attempts" >&2
                return 1
              fi
              delay=$((attempt * 10))
              echo "Retrying required feed '$feed' in ${delay}s" >&2
              sleep "$delay"
              attempt=$((attempt + 1))
            done
          }

          # Only these feeds are needed by the backend and LuCI packages.
          # Avoid fetching routing, telephony, and video.
          update_feed base
          update_feed packages
          update_feed luci

          # Install only the direct build/runtime requirements. The feeds tool
          # follows their dependency graph, so there is no need to link every
          # package definition from the three feeds.
          ./scripts/feeds install -p base ca-bundle tcpdump rpcd-mod-file
          ./scripts/feeds install -p packages golang
          ./scripts/feeds install -p luci luci-base

      - name: Build backend, LuCI, and Simplified Chinese packages
        shell: bash
        run: |
          chmod +x tools/*.sh
          sh tools/build-openwrt-package.sh "$SDK_DIR"

      - name: Collect packages and checksums
        shell: bash
        run: |
          mkdir -p action-dist
          find "$SDK_DIR/bin/packages" -type f \( -name 'iptv-refresh*.apk' -o -name 'iptv-refresh*.ipk' -o -name 'luci-app-iptv-refresh*.apk' -o -name 'luci-app-iptv-refresh*.ipk' -o -name 'luci-i18n-iptv-refresh*.apk' -o -name 'luci-i18n-iptv-refresh*.ipk' \) -exec cp -v {} action-dist/ \;
          count="$(find action-dist -maxdepth 1 -type f | wc -l)"
          if [ "$count" -lt 3 ]; then
            echo "Expected backend, LuCI, and zh-cn packages; found $count"
            exit 1
          fi
          cd action-dist
          find . -maxdepth 1 -type f \( -name '*.apk' -o -name '*.ipk' \) -print0 |
            sort -z | xargs -0 sha256sum > SHA256SUMS

      - name: Upload OpenWrt packages
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: iptv-refresh-openwrt-25.12.5-x86_64
          path: action-dist/
          if-no-files-found: error
          retention-days: 14

      - name: Publish tag release
        if: steps.source.outputs.release_tag != ''
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.source.outputs.release_tag }}
        run: |
          if gh release view "$RELEASE_TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" action-dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --clobber
          else
            gh release create "$RELEASE_TAG" action-dist/* \
              --repo "$GITHUB_REPOSITORY" \
              --verify-tag \
              --generate-notes \
              --title "$RELEASE_TAG"
          fi
