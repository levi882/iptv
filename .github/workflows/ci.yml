name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Go and LuCI checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out source
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version-file: go.mod
          cache: true
          cache-dependency-path: go.sum

      - name: Check Go formatting
        shell: bash
        run: |
          unformatted="$(find . -type f -name '*.go' -print0 | xargs -0 gofmt -l)"
          if [ -n "$unformatted" ]; then
            echo "Run gofmt on:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check public repository safety rules
        shell: bash
        run: sh tools/check-public-repo.sh

      - name: Run Go checks
        run: |
          go version
          go vet ./...
          go test -race -coverprofile=coverage.out ./...

      - name: Check Go dependencies for known vulnerabilities
        run: go run golang.org/x/vuln/cmd/govulncheck@v1.4.0 ./...

      - name: Run LuCI checks
        run: |
          node tools/check-luci-js.cjs luci-app-iptv-refresh/htdocs/luci-static/resources/view/iptv-refresh/*.js
          node tools/test-luci-overview.cjs luci-app-iptv-refresh/htdocs/luci-static/resources/view/iptv-refresh/overview.js
          node tools/test-luci-settings.cjs luci-app-iptv-refresh/htdocs/luci-static/resources/view/iptv-refresh/settings.js
          node tools/test-luci-environment.cjs luci-app-iptv-refresh/htdocs/luci-static/resources/view/iptv-refresh/environment.js

      - name: Run OpenWrt shell checks
        shell: bash
        run: sh tools/test-openwrt-shell.sh

      - name: Build Linux x86-64 binary
        shell: bash
        run: |
          mkdir -p build
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -buildvcs=true -trimpath -ldflags="-s -w -X main.version=ci-${GITHUB_SHA::12}" -o build/iptv-refresh-linux-amd64 ./cmd/iptv-refresh
          sha256sum build/iptv-refresh-linux-amd64 > build/iptv-refresh-linux-amd64.sha256

      - name: Upload Linux binary
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: iptv-refresh-linux-amd64
          path: |
            build/iptv-refresh-linux-amd64
            build/iptv-refresh-linux-amd64.sha256
          if-no-files-found: error
          retention-days: 7
